  var HOUSE_ADS = [
    { eyebrow: 'Prim’s shop', title: 'Printables for the table', body: 'Cards, guides, and digital goods for American mah jongg, from the Order of the Tile shop on Etsy.', cta: 'Visit the Etsy shop', url: 'https://www.etsy.com/shop/OrderofTheTile', bg: '#f9e4d5', accent: 'var(--melon)', ctaText: 'var(--ink)' },
    { eyebrow: 'Listen', title: 'The Order, read aloud', body: 'Every letter becomes an episode. Hear Prim on the podcast, wherever you listen.', cta: 'Listen on Spotify', url: 'https://open.spotify.com/show/0ndaZ0MXj2x03ToJkXMuIT', bg: '#eae1ef', accent: 'var(--orchid)', ctaText: '#fff' },
    { eyebrow: 'From the Order', title: 'Join the table', body: 'Prim’s letters, in your inbox. Game wisdom, traditions, and the stories the table is talking about.', cta: 'Become a Favorite Fourth', url: 'https://newsletter.orderofthetile.com/#/portal/signup', bg: '#f6edc6', accent: '#8a6d1f', ctaText: '#fff' }
  ];

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function richEsc(s) { return esc(s).replace(/&lt;em&gt;/g, '<em>').replace(/&lt;\/em&gt;/g, '</em>'); }
  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
    return isNaN(d) ? '' : d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }
  function fmtMonthDay(iso) {
    if (!iso) return '';
    var d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
    return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  }

  function pickAd() {
    var d = new Date(); // rotate by the actual day so the ad (and its color) changes day to day
    var idx = (isNaN(d) ? 0 : d.getDate()) % HOUSE_ADS.length;
    return HOUSE_ADS[idx];
  }

  // ===== Voting =====
  function getVoted() { try { return JSON.parse(localStorage.getItem('oott_dispatch_votes') || '{}'); } catch (e) { return {}; } }
  function voteControl(a) {
    if (!a.id) return '';
    var score = (a.votes && typeof a.votes.score === 'number') ? a.votes.score : 0;
    var voted = getVoted()[a.id];
    return '<span class="votes" data-id="' + esc(a.id) + '"' + (voted ? ' data-voted="' + voted + '"' : '') + '>' +
      '<button class="vbtn up' + (voted === 'up' ? ' on' : '') + '" data-dir="up" type="button" aria-label="Like"' + (voted ? ' disabled' : '') + '>&#9650;</button>' +
      '<span class="vscore">' + score + '</span>' +
      '<button class="vbtn down' + (voted === 'down' ? ' on' : '') + '" data-dir="down" type="button" aria-label="Not for me"' + (voted ? ' disabled' : '') + '>&#9660;</button>' +
      '</span>';
  }
  function eachVotes(id, fn) { document.querySelectorAll('.votes[data-id="' + id + '"]').forEach(fn); }
  function findArt(id) { for (var i = 0; i < allArticles.length; i++) { if (allArticles[i].id === id) return allArticles[i]; } return null; }
  function handleVote(btn) {
    var wrap = btn.closest('.votes'); if (!wrap) return;
    var id = wrap.getAttribute('data-id'), dir = btn.getAttribute('data-dir');
    var voted = getVoted(); if (voted[id]) return;
    voted[id] = dir;
    try { localStorage.setItem('oott_dispatch_votes', JSON.stringify(voted)); } catch (e) {}
    var art = findArt(id), newScore;
    if (art) { art.votes = art.votes || { up: 0, down: 0, score: 0 }; if (dir === 'up') art.votes.up++; else art.votes.down++; art.votes.score = art.votes.up - art.votes.down; newScore = art.votes.score; }
    else { newScore = dir === 'up' ? 1 : -1; }
    eachVotes(id, function (w) {
      w.setAttribute('data-voted', dir);
      w.querySelectorAll('.vbtn').forEach(function (b) { b.disabled = true; b.classList.toggle('on', b.getAttribute('data-dir') === dir); });
      var s = w.querySelector('.vscore'); if (s) s.textContent = newScore;
    });
    fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ vote: true, id: id, dir: dir }) })
      .then(function (r) { return r.json(); })
      .then(function (res) { if (res && typeof res.score === 'number') { if (art) art.votes.score = res.score; eachVotes(id, function (w) { var s = w.querySelector('.vscore'); if (s) s.textContent = res.score; }); } })
      .catch(function () {});
  }
  document.addEventListener('click', function (e) {
    var t = e.target;
    var btn = (t && t.classList && t.classList.contains('vbtn')) ? t : (t && t.closest ? t.closest('.vbtn') : null);
    if (btn && !btn.disabled) handleVote(btn);
  });
  function renderFavorites() {
    var favs = allArticles.filter(function (a) { return a.votes && a.votes.score > 0; })
      .sort(function (a, b) { return b.votes.score - a.votes.score; }).slice(0, 4);
    var sec = document.getElementById('favorites');
    if (!favs.length) { sec.style.display = 'none'; return; }
    document.getElementById('fav-grid').innerHTML = favs.map(cardHTML).join('');
    sec.style.display = 'block';
  }

  function leadHTML(a) {
    var body = (a.body || []).map(function (p) { return '<p>' + esc(p) + '</p>'; }).join('');
    // Read-more lives at the end of the article flow so it lands after the
    // last line (bottom of the second column), not floating under column one.
    var readmore = a.source_url
      ? '<a class="read-more" href="' + esc(a.source_url) + '" target="_blank" rel="noopener">Read more at ' + esc(a.source_name || 'the source') + ' &rarr;</a>'
      : '';
    var foot = (a.id || readmore) ? '<div class="lead-foot">' + (a.id ? voteControl(a) : '') + readmore + '</div>' : '';
    return '<p class="lead-kicker">' + esc(a.category) + '</p>' +
      '<h2 class="lead-headline">' + richEsc(a.title) + '</h2>' +
      (a.dek ? '<p class="lead-dek">' + richEsc(a.dek) + '</p>' : '') +
      '<div class="lead-body">' + body + '</div>' +
      foot;
  }

  function cardHTML(a) {
    var meta = fmtDate(a.date);
    if (a.source_name) meta += (meta ? '  ·  ' : '') + esc(a.source_name);
    return '<article class="card">' +
      '<p class="card-kicker">' + esc(a.category) + '</p>' +
      '<h3 class="card-headline">' + richEsc(a.title) + '</h3>' +
      (a.dek ? '<p class="card-dek">' + richEsc(a.dek) + '</p>' : '') +
      '<p class="card-meta">' + meta + '</p>' +
      '<div class="card-foot">' + voteControl(a) +
        (a.source_url ? '<a class="read-more" href="' + esc(a.source_url) + '" target="_blank" rel="noopener">Read more &rarr;</a>' : '') +
      '</div>' +
      '</article>';
  }

  function adHTML(side) {
    var ad = pickAd();
    return '<aside class="card house-ad ' + (side === 'left' ? 'in-left' : 'in-right') + '" style="background:' + ad.bg + ';">' +
      '<p class="ad-eyebrow" style="color:' + ad.accent + ';">' + esc(ad.eyebrow) + '</p>' +
      '<img class="ad-seal" src="/images/seal.png" alt="">' +
      '<h3 class="ad-title">' + esc(ad.title) + '</h3>' +
      '<p class="ad-body">' + esc(ad.body) + '</p>' +
      '<a class="ad-cta" href="' + esc(ad.url) + '" target="_blank" rel="noopener" style="background:' + ad.accent + ';color:' + ad.ctaText + ';">' + esc(ad.cta) + '</a>' +
      '</aside>';
  }

  function render(list) {
    // Masthead is the EDITION date: it always reads as today so the page looks
    // current even on a quiet day with no new story, exactly like a newspaper
    // masthead. Each story keeps its own dateline in the card meta below, and
    // the archive calendar + 7-day rolloff stay keyed on real published_at.
    // Guard: never show a masthead date older than the newest published story.
    var now = new Date();
    var todayISO = now.getFullYear() + '-' + pad2(now.getMonth() + 1) + '-' + pad2(now.getDate());
    var editionISO = (LATEST && LATEST > todayISO) ? LATEST : todayISO;
    document.getElementById('dateline-vol').textContent = 'Volume ' + editionISO.slice(0, 4);
    document.getElementById('dateline-date').textContent = fmtMonthDay(editionISO);

    var leadEl = document.getElementById('lead');
    var grid = document.getElementById('dispatch-grid');

    if (!list.length) {
      leadEl.style.display = 'none';
      grid.innerHTML = '<p class="empty-state">No dispatches just yet. <em>Prim is watching.</em></p>';
      return;
    }

    leadEl.innerHTML = leadHTML(list[0]);

    var rest = list.slice(1);
    var html = rest.map(cardHTML).join('');
    // Keep the grid even: an odd number of cards leaves a blank, so fill it
    // with a house ad. The ad lands in the right-hand (even) cell.
    if (rest.length % 2 === 1) html += adHTML('right');
    grid.innerHTML = html;
  }

  // ===== Archive calendar =====
  var allArticles = [], LATEST = EDITION_DATE;
  var calY, calM, selectedDay = null;
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Group by each article's own date, so a calendar day holds only the stories
  // dated that exact day (a day may have just one).
  function indexByDate(list) {
    var by = {};
    list.forEach(function (a) { if (a.date) { (by[a.date] = by[a.date] || []).push(a); } });
    return by;
  }
  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  // Entry point: store the full list, render it, and build the calendar.
  function setData(list) {
    allArticles = (list || []).slice().sort(function (a, b) { var x = a.date || '', y = b.date || ''; return x < y ? 1 : (x > y ? -1 : 0); });
    selectedDay = null;
    document.getElementById('day-banner').style.display = 'none';
    LATEST = (allArticles[0] && allArticles[0].date) || EDITION_DATE;
    showLatest();
    var p = LATEST.split('-');
    calY = parseInt(p[0], 10); calM = parseInt(p[1], 10) - 1;
    drawCalendar();
    renderFavorites();
  }

  function drawCalendar() {
    var by = indexByDate(allArticles);
    document.getElementById('cal-month').textContent = MONTHS[calM] + ' ' + calY;
    var html = ['S','M','T','W','T','F','S'].map(function (d) { return '<div class="cal-dow">' + d + '</div>'; }).join('');
    var first = new Date(calY, calM, 1).getDay();
    var days = new Date(calY, calM + 1, 0).getDate();
    for (var i = 0; i < first; i++) html += '<div class="cal-day empty"></div>';
    for (var d = 1; d <= days; d++) {
      var ds = calY + '-' + pad2(calM + 1) + '-' + pad2(d);
      var has = by[ds] && by[ds].length;
      var cls = 'cal-day' + (has ? ' has' : '') + (selectedDay === ds ? ' sel' : '');
      html += '<div class="' + cls + '"' + (has ? ' data-day="' + ds + '"' : '') + '>' + d + '</div>';
    }
    var grid = document.getElementById('cal-grid');
    grid.innerHTML = html;
    grid.querySelectorAll('.cal-day.has').forEach(function (el) {
      el.addEventListener('click', function () { selectDay(el.getAttribute('data-day')); });
    });
    var keys = Object.keys(by).map(function (k) { return k.slice(0, 7); });
    var curK = calY + '-' + pad2(calM + 1);
    var minK = keys.length ? keys.reduce(function (a, b) { return a < b ? a : b; }) : null;
    var maxK = keys.length ? keys.reduce(function (a, b) { return a > b ? a : b; }) : null;
    document.getElementById('cal-prev').disabled = !minK || curK <= minK;
    document.getElementById('cal-next').disabled = !maxK || curK >= maxK;
  }

  function selectDay(ds) {
    selectedDay = ds;
    var items = indexByDate(allArticles)[ds] || [];
    render(items);
    var label = new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    var banner = document.getElementById('day-banner');
    banner.innerHTML = '<span class="day-banner-text">Showing ' + label + '  &middot;  ' + items.length + (items.length === 1 ? ' dispatch' : ' dispatches') + '</span><a class="day-banner-back">&larr; Back to the latest</a>';
    banner.style.display = 'flex';
    banner.querySelector('.day-banner-back').addEventListener('click', backToLatest);
    drawCalendar();
    var y = banner.getBoundingClientRect().top + window.scrollY - 84;
    window.scrollTo({ top: y < 0 ? 0 : y, behavior: 'smooth' });
  }
  function showLatest() {
    // Front page shows the full rolling window (already bounded to the last
    // ROLLOFF_DAYS days by withinRolloff), newest first.
    render(allArticles);
  }
  function backToLatest() {
    selectedDay = null;
    showLatest();
    document.getElementById('day-banner').style.display = 'none';
    drawCalendar();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('cal-prev').addEventListener('click', function () { calM--; if (calM < 0) { calM = 11; calY--; } drawCalendar(); });
  document.getElementById('cal-next').addEventListener('click', function () { calM++; if (calM > 11) { calM = 0; calY++; } drawCalendar(); });

  // 7-day rolloff: the public page shows only dispatches published within the
  // last ROLLOFF_DAYS days. Older items are NOT deleted (the approval queue and
  // the API keep the full history); they simply roll off the public page.
  var ROLLOFF_DAYS = 7;
  function withinRolloff(list) {
    var cutoff = new Date(); cutoff.setHours(0, 0, 0, 0);
    cutoff.setDate(cutoff.getDate() - ROLLOFF_DAYS);
    return (list || []).filter(function (a) {
      if (!a.date) return false;
      var d = new Date(a.date + 'T12:00:00');
      return !isNaN(d) && d >= cutoff;
    });
  }

  function fromLiveFeed() {
    fetch(API, { headers: { Accept: 'application/json' } })
      .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then(function (items) {
        var mapped = (items || []).map(function (it) {
          return {
            category: it.category || 'Hot News',
            title: it.title,
            dek: it.dek || it.summary || '',
            body: Array.isArray(it.body) ? it.body : (it.summary ? [it.summary] : []),
            source_url: it.source_url,
            source_name: it.source_name || '',
            date: (it.published_at || it.created_at || '').slice(0, 10),
            editionDate: (it.created_at || it.published_at || '').slice(0, 10),
            id: it.id,
            votes: it.votes || { up: 0, down: 0, score: 0 }
          };
        });
        // Apply the 7-day rolloff. If the live feed returned items but none are
        // within the window, show the (empty) recent window and let the
        // empty-state copy stand. Only fall back to the baked edition when the
        // live feed returned nothing at all, so a cold API never blanks the page.
        setData(mapped.length ? withinRolloff(mapped) : ARTICLES);
      })
      .catch(function () {
        // Feed unreachable: serve the baked edition rather than an error.
        setData(ARTICLES);
      });
  }

  if (USE_SAMPLE) {
    setData(ARTICLES);
  } else {
    fromLiveFeed();
  }
})();
</script>
</body>
</html>
