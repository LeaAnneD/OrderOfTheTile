<style>
  :root{
    --paper:#FBF6EE; --paper-2:#F3EADc; --ink:#2B2622; --ink-soft:#6B5F54;
    --rose:#B76E79; --rose-deep:#9A5662; --sage:#7E8A6F; --line:#E2D6C4;
    --good:#5E7D5A; --good-bg:#E4EFE0; --bad:#B5524C; --bad-bg:#F6E2E0; --gold:#C9A24A; --gold-bg:#F6ECCB;
    --bam:#3C7A4E; --crak:#B5524C; --dot:#3A5C86; --honor:#6B5F54; --flower:#B76E79; --joker:#9A7B1E;
    --shadow:0 2px 6px rgba(43,38,34,.12), 0 8px 24px rgba(43,38,34,.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--paper); color:var(--ink); font-family:"Crimson Text",Georgia,serif; overscroll-behavior:none;}
  .wrap{max-width:780px; margin:0 auto; padding:16px 16px 48px;}
  .gamehdr{display:flex;align-items:center;gap:12px;padding:6px 0 9px;border-bottom:1px solid var(--line);margin-bottom:10px;}
  .gamehdr .backlink{font-family:"Playfair Display",serif;font-weight:600;color:var(--rose-deep);text-decoration:none;font-size:.95rem;}
  .backlink:hover{text-decoration:underline;} .gamehdr .brandmark{margin-left:auto;font-family:"Playfair Display",serif;font-weight:700;color:var(--ink);font-size:.92rem;}
  .authbar{display:flex; align-items:center; gap:8px; justify-content:flex-end; margin-bottom:8px; flex-wrap:wrap;}
  .authstatus{margin-right:auto; color:var(--ink-soft); font-size:.86rem; font-style:italic;}
  .btn.mini{font-size:.85rem; padding:6px 12px;}
  h1{font-family:"Playfair Display",serif; font-weight:700; font-size:1.6rem; margin:.1em 0; text-align:center;}
  .sub{color:var(--ink-soft); font-style:italic; margin:0 0 12px; text-align:center;}
  button.btn{font-family:"Crimson Text",serif; font-size:1rem; border-radius:11px; padding:10px 18px; border:1px solid var(--rose-deep); background:var(--rose); color:#fff; cursor:pointer; box-shadow:var(--shadow);}
  button.ghost{background:#fff; color:var(--ink); border-color:var(--line);}
  button:disabled{opacity:.45; cursor:not-allowed;}
  /* Prim coach bubble */
  .coach{display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid var(--line); border-left:4px solid var(--rose); border-radius:14px; padding:13px 16px; box-shadow:var(--shadow); margin:8px 0 14px; min-height:64px;}
  .coach .ava{flex:0 0 auto; width:42px; height:42px; border-radius:50%; background:var(--rose); color:#fff; display:flex; align-items:center; justify-content:center; font-family:"Playfair Display",serif; font-weight:700; font-size:1.2rem;}
  .coach .says{flex:1;}
  .coach .who{font-family:"Playfair Display",serif; font-weight:600; color:var(--rose-deep); font-size:.86rem; margin-bottom:1px;}
  .coach .line{line-height:1.42;}
  .coach .line b{color:var(--ink);}
  /* target read card (section+line+rule only — never the pattern) */
  .target{background:var(--paper-2); border:1px solid var(--line); border-radius:12px; padding:10px 14px; margin-bottom:12px;}
  .target .lead{font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft);}
  .target .name{font-family:"Playfair Display",serif; font-weight:700; font-size:1.12rem;}
  .target .val{display:inline-block; font-size:.76rem; color:var(--rose-deep); border:1px solid var(--rose); border-radius:999px; padding:0 8px; margin-left:6px; vertical-align:middle;}
  .target .rule{font-style:italic; color:var(--ink); font-size:.94rem; margin-top:3px; line-height:1.36;}
  /* HUD */
  .hud{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:2px 0 10px;}
  .stat{background:#fff; border:1px solid var(--line); border-radius:12px; padding:6px 14px; box-shadow:var(--shadow); min-width:80px; text-align:center;}
  .stat .k{font-size:.64rem; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);}
  .stat .v{font-family:"Playfair Display",serif; font-weight:700; font-size:1.2rem; line-height:1.1;}
  /* rack */
  .racklbl{font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin:6px 2px 4px; display:flex; justify-content:space-between;}
  .rack{display:flex; gap:5px; flex-wrap:wrap; justify-content:center; min-height:66px; padding:12px 10px; border:2px solid var(--line); border-radius:14px; background:#fff; touch-action:none;}
  .tile{position:relative; width:46px; height:60px; border-radius:8px; background:#fff; border:1px solid #E1D6c2; box-shadow:0 2px 5px rgba(0,0,0,.16);
    display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; line-height:1; cursor:grab;}
  .tile .n{font-family:"Playfair Display",serif; font-weight:700; font-size:1.2rem;}
  .tile .s{font-size:.55rem; text-transform:uppercase; letter-spacing:.04em; margin-top:3px;}
  .tile.bam{color:var(--bam);} .tile.crak{color:var(--crak);} .tile.dot{color:var(--dot);} .tile.honor{color:var(--honor);} .tile.flower{color:var(--flower);} .tile.joker{color:var(--joker);}
  .tile.img{background:none; border:none; box-shadow:none; padding:0;}
  .tile.img .tface{height:100%; width:auto; filter:none; border-radius:6px;}
  .tile.dragging{transform:translateY(-12px) scale(1.07); box-shadow:0 0 0 2px var(--gold), 0 12px 20px rgba(0,0,0,.3); border-color:var(--gold); cursor:grabbing; z-index:5;}
  .tile.img.rec{outline:2.5px dashed var(--rose); outline-offset:2px; border-radius:8px;}
  .tile.img.fresh{outline:2.5px solid var(--gold); outline-offset:2px; border-radius:8px;}
  .tile.img.sel{outline:3px solid var(--rose-deep); outline-offset:2px; border-radius:8px;}
  .tile.fresh{outline:2.5px solid var(--gold); outline-offset:1px;}
  .tile.rec{outline:2.5px dashed var(--rose); outline-offset:1px;}
  .tile.keep{box-shadow:0 0 0 2px var(--good), 0 2px 5px rgba(0,0,0,.16);}
  .tile .badge{position:absolute; top:-7px; right:-6px; background:var(--gold); color:#3a2f12; font-size:.54rem; font-weight:700; border-radius:999px; padding:1px 5px;}
  .controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center; margin-top:14px;}
  .hint{color:var(--ink-soft); font-style:italic; font-size:.9rem; text-align:center; min-height:1.3em; margin-top:8px;}
  /* panels + modal */
  .panel{background:#fff; border:1px solid var(--line); border-radius:18px; padding:22px 20px; box-shadow:var(--shadow); text-align:center;}
  .panel h2{font-family:"Playfair Display",serif; margin:.1em 0 .4em;}
  .panel p{line-height:1.5; color:var(--ink-soft);}
  .panel .startbtns{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px;}
  .scrim{position:fixed; inset:0; background:rgba(43,38,34,.46); display:none; align-items:center; justify-content:center; padding:18px; z-index:1000;}
  .scrim.show{display:flex;}
  .card{background:var(--paper); border-radius:18px; max-width:460px; width:100%; padding:24px 22px; box-shadow:0 20px 60px rgba(0,0,0,.3); border:1px solid var(--line); max-height:88vh; overflow:auto;}
  .card h2{font-family:"Playfair Display",serif; margin:.1em 0 .4em; font-size:1.5rem;}
  .card .verdict{font-style:italic; color:var(--ink-soft); margin-bottom:6px;}
  .modal-actions{display:grid; grid-template-columns:1fr; gap:10px; margin-top:16px;} .modal-actions .btn{width:100%; padding:11px 10px; margin:0;}
  .authform{display:flex; flex-direction:column; gap:10px;} .authform input{font-family:inherit; font-size:1rem; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink);}
  .authmsg{font-size:.9rem; color:var(--bad); min-height:1.2em;} .authmsg.ok{color:var(--good);}
  .lbtabs{display:flex; gap:8px; margin-bottom:12px;} .lbtable{width:100%; border-collapse:collapse; font-size:.95rem;}
  .lbtable td,.lbtable th{padding:6px 8px; border-bottom:1px solid var(--line); text-align:left;} .lbtable th{font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);}
  .note{font-style:italic; color:var(--ink-soft); font-size:.92rem;}
  .prim-card h2{color:var(--rose-deep);}
  .footer-note{margin-top:28px; color:var(--ink-soft); font-size:.82rem; text-align:center;}
  @media(max-width:560px){ h1{font-size:1.36rem;} .tile{width:40px; height:52px;} .tile .n{font-size:1rem;} }
</style>

<body>
<div class="wrap">
  <div class="gamehdr"><a class="backlink" href="../preview.html">← All games</a><span class="brandmark">Order of the Tile</span></div>
  <div class="authbar" id="authbar">
    <span id="authStatus" class="authstatus">·</span>
    <button id="lbBtn" class="btn ghost mini">Leaderboard</button>
    <button id="authBtn" class="btn mini">Log in / Sign up</button>
    <button id="logoutBtn" class="btn ghost mini" style="display:none;">Log out</button>
  </div>
  <h1>Coached Hand</h1>
  <p class="sub">Play one full hand with Prim at your shoulder — she'll talk you through every choice.</p>
  <div id="cardsel" style="margin:2px 0 14px;"></div>
  <div id="silonote"></div>

  <div id="stage"></div>

  <div id="errbar" style="display:none; margin-top:16px; padding:10px 14px; border-radius:10px; background:#F6E2E0; border:1px solid #B5524C; color:#7a2f2b; font-size:.86rem; white-space:pre-wrap;"></div>
  <p class="footer-note">Order of the Tile · a free guided hand · American Mah Jongg (NMJL) · the card stays in your hands, never on the screen · <span id="buildStamp">build —</span></p>
</div>

<script src="../_data/card2026.js"></script>
<script src="../_engine/cardselect.js"></script>
<script src="../_engine/siloednote.js"></script>
<script src="../_engine/scenario.js"></script>

<script>
"use strict";
const BUILD="v1.6 · 2026-06-12";
function showErr(msg){try{const b=document.getElementById('errbar'); if(b){b.style.display='block'; b.textContent='⚠ Something broke — screenshot this for Lea Anne:\n'+msg;} const log=JSON.parse(localStorage.getItem('oott_coach_err')||'[]'); log.push({t:new Date().toISOString(),build:BUILD,msg:String(msg)}); localStorage.setItem('oott_coach_err',JSON.stringify(log.slice(-12)));}catch(_){}}
window.addEventListener('error',e=>showErr((e.error&&e.error.stack)||e.message||'unknown error'));
window.addEventListener('unhandledrejection',e=>showErr('promise: '+((e.reason&&(e.reason.stack||e.reason.message))||e.reason)));
document.addEventListener('DOMContentLoaded',()=>{const s=document.getElementById('buildStamp'); if(s)s.textContent='build '+BUILD;});

let CARD=(window.OOTTCARD && OOTTCARD.active().length) ? OOTTCARD.active() : (window.OOTT_CARD2026||[]);
const Kit=window.OOTTKit;
const $=s=>document.querySelector(s), ce=(t,c)=>{const e=document.createElement(t); if(c)e.className=c; return e;};
const rnd=Math.random, ri=n=>Math.floor(rnd()*n), pick=a=>a[ri(a.length)];

/* ---------- face helpers (faces are codes: 2B,6C,WD,RD,GD,N,E,W,S,F,JK) ---------- */
function parseHand(str){ const o={}; str.split(' ').forEach(t=>{ if(!t)return; const f=t.slice(0,-1), c=+t.slice(-1); o[f]=(o[f]||0)+c; }); return o; }
function faceInfo(f){
  if(/^[1-9][BCD]$/.test(f)){ const n=f[0], s=f[1]; const m={B:['Bam','bam'],C:['Crak','crak'],D:['Dot','dot']}; return {n, sub:m[s][0], cls:m[s][1]}; }
  if(f==='WD') return {n:'○', sub:'Soap', cls:'honor'};
  if(f==='RD') return {n:'R', sub:'Dragon', cls:'crak'};
  if(f==='GD') return {n:'G', sub:'Dragon', cls:'bam'};
  if(f==='N')  return {n:'N', sub:'Wind', cls:'honor'};
  if(f==='E')  return {n:'E', sub:'Wind', cls:'honor'};
  if(f==='W')  return {n:'W', sub:'Wind', cls:'honor'};
  if(f==='S')  return {n:'S', sub:'Wind', cls:'honor'};
  if(f==='F')  return {n:'❀', sub:'Flower', cls:'flower'};
  if(f==='JK') return {n:'J', sub:'Joker', cls:'joker'};
  return {n:f, sub:'', cls:'honor'};
}
function faceLabel(f){ const i=faceInfo(f); return i.n+' '+i.sub; }
function faceOrder(f){
  if(/^[1-9]D$/.test(f))return [0,+f[0]];
  if(/^[1-9]B$/.test(f))return [1,+f[0]];
  if(/^[1-9]C$/.test(f))return [2,+f[0]];
  if('NEWS'.indexOf(f)>=0)return [3,'NEWS'.indexOf(f)];
  if(f==='RD')return[4,0]; if(f==='GD')return[4,1]; if(f==='WD')return[4,2];
  if(f==='F')return[5,0]; if(f==='JK')return[6,0]; return [7,0];
}
const ALLNAT=(function(){ const o=[]; ['D','B','C'].forEach(s=>{for(let r=1;r<=9;r++)o.push(r+s);}); ['N','E','W','S','RD','GD','WD','F'].forEach(f=>o.push(f)); return o; })();
function countMap(arr){ const o={}; arr.forEach(f=>o[f]=(o[f]||0)+1); return o; }

/* ---------- win check against ONE concrete target hand (joker-aware) ----------
   Jokers fill shortfalls ONLY where the target needs >=3 of a face (pung/kong/quint),
   never singles or pairs. Every non-joker tile must belong to the target. */
function completesHand(rack, target){
  const rc={}; let jok=0; rack.forEach(f=>{ if(f==='JK')jok++; else rc[f]=(rc[f]||0)+1; });
  for(const f in rc){ if(!target[f] || rc[f]>target[f]) return false; }
  let jokerNeed=0;
  for(const f in target){ const short=target[f]-(rc[f]||0); if(short>0){ if(target[f]<3) return false; jokerNeed+=short; } }
  return jokerNeed===jok;
}
function anyComplete(rack, hands){ for(const h of hands){ if(completesHand(rack, parseHand(h))) return parseHand(h); } return null; }
/* tiles-away from a target hand, jokers filling 3+ shortfalls */
function awayFrom(rc, jok, target){
  let need=0, jokerable=0;
  for(const f in target){ const short=target[f]-(rc[f]||0); if(short>0){ if(target[f]>=3) jokerable+=short; else need+=short; } }
  const useJ=Math.min(jok,jokerable);
  return need + (jokerable-useJ);
}
function bestTargetHand(rack, hands){
  const rc={}; let jok=0; rack.forEach(f=>{ if(f==='JK')jok++; else rc[f]=(rc[f]||0)+1; });
  let best=99,bh=null; for(const h of hands){ const t=parseHand(h); const a=awayFrom(rc,jok,t); if(a<best){best=a;bh=t;} } return {away:best, target:bh};
}

/* ---------- choose a teachable target line ---------- */
function chooseLine(){
  // flexible-ish lines without quints (quints need jokers and complicate the teach); n>=6
  const pool=CARD.filter(L=> L.sec!=='Quints' && L.n>=6);
  return pick(pool.length?pool:CARD);
}

/* ---------- deal a 13-tile hand leaning toward a target concrete hand ---------- */
function dealLeaning(seedHand){
  const tiles=[]; for(const f in seedHand) for(let k=0;k<seedHand[f];k++) tiles.push(f);
  Kit.shuffle(tiles, rnd);
  const keep=tiles.slice(0, 7+ri(2)); // keep 7-8 of the 14
  const faces=keep.slice();
  // fill to 13 with plausible junk (random naturals + maybe a joker)
  while(faces.length<13){
    let f = rnd()<0.10 ? 'JK' : pick(ALLNAT);
    if(f!=='JK' && faces.filter(x=>x===f).length>=4) continue;
    if(f==='JK' && faces.filter(x=>x==='JK').length>=2) continue;
    faces.push(f);
  }
  return faces.map(mkTile);
}

/* ===================================================================== */
/* GAME STATE                                                            */
/* ---------------------------------------------------------------------
   The rack is an array of tile OBJECTS {c:faceCode, id:uid} — a STABLE id
   per physical tile (so duplicates never get confused during a drag, the
   same identity model the other games use). rackFaces() flattens to the
   face-code array the win/closeness helpers expect.
   ===================================================================== */
let G=null, UID=1;
const uid=()=>UID++, mkTile=c=>({c, id:uid()});
function rackFaces(){ return G.rack.map(t=>t.c); }
function newGame(){
  const line=chooseLine();
  const seedHand=parseHand(pick(line.hands));
  const rack=sortRack(dealLeaning(seedHand));
  G={ line, seedHand, rack, draws:0, discards:0, phase:'intro', pendingId:null, byAdvice:false, drawnId:null, lastDrawnFace:null, charlestonDone:false, charlestonSel:null };
}
function sortRack(arr){ return arr.slice().sort((a,b)=>{ const x=faceOrder(a.c),y=faceOrder(b.c); return x[0]-y[0]||x[1]-y[1]; }); }

/* ---------- how many Jokers the best target can still use (shortfalls in 3+ groups only) ---------- */
function targetJokerNeed(){
  const {target}=bestTargetHand(rackFaces(), G.line.hands);
  const rc=countMap(rackFaces().filter(f=>f!=='JK'));
  let need=0; for(const f in target){ if(target[f]>=3){ const short=target[f]-(rc[f]||0); if(short>0) need+=short; } }
  return need;
}
/* ---------- which held tile is least useful toward the best target (returns its id) ---------- */
function leastUsefulId(){
  const {target}=bestTargetHand(rackFaces(), G.line.hands);
  const jokNeed=targetJokerNeed();
  const used={}; let jUsed=0; let worst=null, worstScore=-1;
  G.rack.forEach(t=>{
    const f=t.c; let score;
    if(f==='JK'){ const useful=jUsed<jokNeed; jUsed++; score=useful?0:3; } // a Joker the line can't place is the deadest weight there is
    else {
      const need=target[f]||0; const have=used[f]||0; const useful=have<need; used[f]=have+1;
      score = useful?0:2;
      if(f==='F' && !target['F']) score+=1;
      if((f==='RD'||f==='GD'||f==='WD'||'NEWS'.indexOf(f)>=0) && !need) score+=0.5;
    }
    if(score>worstScore){ worstScore=score; worst=t.id; }
  });
  return worst;
}
/* ---------- what useful tile does the best target still want ---------- */
function neededFace(){
  const {target}=bestTargetHand(rackFaces(), G.line.hands);
  const rc=countMap(rackFaces().filter(f=>f!=='JK'));
  // DISTINCT faces still short — no shortage-weighting, so a kong (needs 4 of one tile)
  // doesn't flood every draw with that same tile. Spread the help across what's needed.
  const wants=[]; for(const f in target){ if(target[f]-(rc[f]||0)>0) wants.push(f); }
  if(!wants.length) return pick(ALLNAT);
  let f=pick(wants);
  // don't hand the same face two draws running when there's another useful option
  if(G&&G.lastDrawnFace&&f===G.lastDrawnFace&&wants.length>1) f=pick(wants.filter(x=>x!==G.lastDrawnFace));
  return f;
}
/* ---------- is discarding THIS tile a good idea? (good = dead weight) ---------- */
function discardVerdict(id){
  const t=G.rack.find(x=>x.id===id); if(!t) return {good:true};
  const f=t.c; const {target}=bestTargetHand(rackFaces(), G.line.hands);
  if(f==='JK'){ const jok=rackFaces().filter(x=>x==='JK').length; return {good: jok>targetJokerNeed(), joker:true}; }
  const need=target[f]||0; const have=rackFaces().filter(x=>x===f).length;
  return {good: have>need}; // an extra copy beyond what the line needs (or a face it doesn't want) is safe to pitch
}

/* ===================================================================== */
/* RENDER                                                                */
/* ===================================================================== */
function tileEl(t){
  const el=ce('div','tile img');
  el.dataset.id=t.id; el.dataset.face=t.c;
  el.innerHTML=window.OOTTTILES.img(t.c);
  return el;
}
function renderStage(){
  const L=G.line;
  $('#stage').innerHTML=`
    <div class="coach"><div class="ava">P</div><div class="says"><div class="who">Prim</div><div class="line" id="coachLine">…</div></div></div>
    <div class="target"><span class="lead">Building toward</span>
      <div class="name">${L.sec} · Line ${L.line} <span class="val">${L.val}${L.conceal?' · C':''}</span></div>
      <div class="rule">“${L.rule}”</div></div>
    <div class="hud">
      <div class="stat"><div class="k">Tiles</div><div class="v" id="hTiles">${G.rack.length}</div></div>
      <div class="stat"><div class="k">Draws</div><div class="v" id="hDraws">${G.draws}</div></div>
      <div class="stat"><div class="k">Away</div><div class="v" id="hAway">—</div></div>
    </div>
    <div class="racklbl"><span>Your rack — drag tiles to arrange them</span><span id="rackHint"></span></div>
    <div class="rack" id="rack"></div>
    <div class="hint" id="hint"></div>
    <div class="controls" id="controls"></div>`;
  renderRack();
  updateAway();
}
function renderRack(){
  const r=$('#rack'); if(!r) return; r.innerHTML='';
  G.rack.forEach(t=>{ r.appendChild(tileEl(t)); });
  const byId=id=>[...r.children].find(c=>+c.dataset.id===id);
  // the tile chosen to discard: solid ring if the PLAYER picked it, dashed if it's Prim's suggestion
  if((G.phase==='discard'||G.phase==='declare')){
    if(G.pendingId!=null){ const el=byId(G.pendingId); if(el)el.classList.add(G.byAdvice?'rec':'sel'); }
    if(G.drawnId!=null){ const el=byId(G.drawnId); if(el){ el.classList.add('fresh'); const b=ce('span','badge'); b.textContent='new'; el.appendChild(b); } }
  }
  // Charleston: dashed = tiles selected to pass
  if(G.phase==='charleston' && G.charlestonSel){
    [...r.children].forEach(el=>{ el.classList.toggle('rec', G.charlestonSel.has(+el.dataset.id)); });
  }
  attachRackDnD();
}
function updateAway(){ const {away}=bestTargetHand(rackFaces(), G.line.hands); const e=$('#hAway'); if(e)e.textContent=away; if($('#hTiles'))$('#hTiles').textContent=G.rack.length; if($('#hDraws'))$('#hDraws').textContent=G.draws; return away; }
function say(html){ const e=$('#coachLine'); if(e)e.innerHTML=html; }
function hint(html){ const e=$('#hint'); if(e)e.innerHTML=html||''; }

/* ---------- drag-to-rearrange + tap, the shared pattern (Solo-Mahj / Hand-Sorting) ----------
   ONE set of listeners on the rack CONTAINER, pointer captured on the container,
   tiles tracked by stable data-id, the MODEL array spliced and repainted live so
   the grabbed tile slides onto the target and the rest shift. A move = reorder
   (any phase, so you can organize whenever); a tap = discard / Charleston-select. */
function attachRackDnD(){
  const rack=$('#rack'); if(!rack || rack.__dnd) return; rack.__dnd=true;
  let drag=null;
  const markDrag=()=>{ const e=[...rack.children].find(ch=>+ch.dataset.id===drag.id); if(e)e.classList.add('dragging'); };
  rack.addEventListener('pointerdown',e=>{
    const tile=e.target.closest('.tile'); if(!tile) return;
    drag={ id:+tile.dataset.id, x:e.clientX, y:e.clientY, moved:false };
    try{ rack.setPointerCapture(e.pointerId); }catch(_){}
  });
  rack.addEventListener('pointermove',e=>{
    if(!drag) return;
    if(!drag.moved){ if(Math.abs(e.clientX-drag.x)<6 && Math.abs(e.clientY-drag.y)<6) return; drag.moved=true; markDrag(); }
    const u=document.elementFromPoint(e.clientX,e.clientY); const tile=u&&u.closest&&u.closest('.tile');
    if(!tile || tile.parentElement!==rack) return;
    const tId=+tile.dataset.id; if(tId===drag.id) return;
    const from=G.rack.findIndex(t=>t.id===drag.id), to=G.rack.findIndex(t=>t.id===tId);
    if(from<0||to<0) return;
    const t=G.rack.splice(from,1)[0]; G.rack.splice(to,0,t); renderRack(); markDrag();
  });
  const end=()=>{ if(!drag) return; const wasDrag=drag.moved, id=drag.id; drag=null; if(wasDrag) renderRack(); else onTapTile(id); };
  rack.addEventListener('pointerup',end); rack.addEventListener('pointercancel',end);
}
function onTapTile(id){
  if(G.phase==='discard'){ selectForDiscard(id, false); }
  else if(G.phase==='charleston'){ toggleCharlestonId(id); }
}

/* ===================================================================== */
/* FLOW                                                                  */
/* ===================================================================== */
function startScreen(){
  // "siloed view" framing: fuller Prim beat the first time, quiet one-liner after.
  const firstTime = window.OOTTSILO && !OOTTSILO.seen('coached');
  const beat = firstTime ? OOTTSILO.beatHTML() : '';
  if(window.OOTTSILO){
    if(firstTime){ OOTTSILO.ensureCSS(); OOTTSILO.mark('coached'); if($('#silonote'))$('#silonote').innerHTML=''; }
    else { OOTTSILO.mountNote($('#silonote')); }
  }
  $('#stage').innerHTML=`<div class="panel">${beat}
    <h2>One hand, start to finish</h2>
    <p>Prim deals you thirteen tiles and reads the table for you — which line on the card your rack is reaching for. Then you play it out together: draw, study, discard, and declare when the hand is whole.</p>
    <p>She'll tell you what each draw means and nudge the tile she'd let go — but the choice is always yours. This is a <b>teaching</b> hand, so the draws lean your way.</p>
    <div class="startbtns"><button class="btn" id="dealBtn">Deal me in</button></div>
  </div>`;
  $('#dealBtn').onclick=()=>{ newGame(); intro(); };
}

function intro(){
  G.phase='intro';
  renderStage();
  const away=updateAway();
  say(`Let's see what we were dealt… You're leaning toward <b>${G.line.sec}, Line ${G.line.line}</b>. That hand wants: <i>${G.line.rule}</i> You're about <b>${away}</b> tiles from there. We'll get the dead weight out first, then draw toward it.`);
  hint('When you\'re ready, we\'ll do one Charleston pass — give away three you don\'t need.');
  const c=$('#controls'); c.innerHTML='';
  const b=ce('button','btn'); b.textContent='Start the Charleston'; b.onclick=charlestonPick; c.appendChild(b);
}

/* ---- Charleston: Prim pre-selects 3 to pass; player can change, then pass ---- */
function charlestonPick(){
  G.phase='charleston';
  G.charlestonSel=new Set();   // start empty — the player chooses
  renderStage();
  say(`The Charleston — you pass three to your right. Which three are <b>dead weight</b> for ${G.line.sec} Line ${G.line.line}? Tap the three you'd let go. (Drag to organize; no Jokers.)`);
  const c=$('#controls'); c.innerHTML='';
  const b=ce('button','btn'); b.id='passBtn'; b.textContent='Pass these 3 →'; b.onclick=doCharlestonPass; c.appendChild(b);
  const help=ce('button','ghost btn'); help.textContent='I\'m not sure — show me'; help.onclick=charlestonAdvice; c.appendChild(help);
  updatePassBtn();
}
function charlestonAdvice(){
  G.charlestonSel=new Set(pickThreeLeastUsefulIds());
  renderRack();
  hint('The three I\'d pass are dashed — keep them or swap in your own, then send them along.');
  updatePassBtn();
}
function pickThreeLeastUsefulIds(){
  const {target}=bestTargetHand(rackFaces(), G.line.hands);
  const used={}; const scored=G.rack.map(t=>{
    const f=t.c; if(f==='JK') return {id:t.id,score:-99};
    const need=target[f]||0, have=used[f]||0; used[f]=have+1;
    let s=(have<need)?0:2; if(f==='F'&&!target['F'])s+=1; if(!need)s+=0.4;
    return {id:t.id,score:s};
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,3).map(x=>x.id);
}
function toggleCharlestonId(id){
  const t=G.rack.find(x=>x.id===id); if(!t) return;
  if(t.c==='JK'){ hint('Jokers can never be passed in the Charleston.'); return; }
  if(G.charlestonSel.has(id)) G.charlestonSel.delete(id);
  else { if(G.charlestonSel.size>=3){ hint('That\'s already three — tap one to take it back first.'); return; } G.charlestonSel.add(id); }
  renderRack(); updatePassBtn();
}
function updatePassBtn(){ const b=$('#passBtn'); if(b){ b.disabled=G.charlestonSel.size!==3; } hint(`Selected ${G.charlestonSel.size} of 3 to pass.`); }
function doCharlestonPass(){
  if(G.charlestonSel.size!==3) return;
  // grade THEIR picks before the tiles leave: how many were genuinely dead weight?
  let dead=0; [...G.charlestonSel].forEach(id=>{ if(discardVerdict(id).good) dead++; });
  G.rack=G.rack.filter(t=>!G.charlestonSel.has(t.id));
  // receive 3: bias toward tiles the target still wants
  for(let k=0;k<3;k++){ G.rack.push(mkTile(rnd()<0.6 ? neededFace() : pick(ALLNAT))); }
  G.rack=sortRack(G.rack); G.charlestonDone=true; G.charlestonSel=null;
  renderStage();
  const away=updateAway();
  const grade = dead===3 ? `All three were dead weight — that's exactly the read.`
              : dead===2 ? `Two of those were good to pass; one was still doing a little work for you.`
              : dead===1 ? `One clean pass there — a couple of those were actually helping your hand.`
              : `Bold — most of those were working tiles. We'll build it back.`;
  say(`${grade} Look what came back: you're about <b>${away}</b> away now. From here it's draw and discard — draw when you're ready.`);
  hint('Drag tiles any time to organize your rack.');
  beginDrawPhase();
}

/* ---- main draw/discard loop ---- */
function beginDrawPhase(){
  G.phase='draw'; G.drawnId=null; G.pendingId=null; G.byAdvice=false;
  const c=$('#controls'); c.innerHTML='';
  const b=ce('button','btn'); b.id='drawBtn'; b.textContent='Draw a tile'; b.onclick=drawTile; c.appendChild(b);
  maybeOfferDeclare();
}
function drawTile(){
  if(G.phase!=='draw') return;
  // bias: 68% a needed tile, else random — but only feed a Joker the line can actually use
  let f;
  if(rnd()<0.68) f=neededFace();
  else {
    const canJoker = targetJokerNeed() > rackFaces().filter(x=>x==='JK').length;
    f = (rnd()<0.10 && canJoker) ? 'JK' : pick(ALLNAT);
  }
  G.lastDrawnFace=f;
  const t=mkTile(f); G.rack.push(t); G.draws++;
  G.rack=sortRack(G.rack);
  G.drawnId=t.id; G.pendingId=null; G.byAdvice=false;
  G.phase='discard';
  // win?
  if(anyComplete(rackFaces(), G.line.hands)){ offerDeclare(t.id); return; }
  renderRack();
  if($('#hTiles'))$('#hTiles').textContent=G.rack.length;
  if($('#hDraws'))$('#hDraws').textContent=G.draws;
  const away=updateAway();
  // gradual release: narrate the draw, then hand the decision to the player — no recommendation yet
  say(drawPrompt(f, away));
  hint(G.draws<=2 ? 'Tap a tile to choose it — I\'ll tell you what I think before you commit. Drag any tile to organize.' : 'Tap your discard, then confirm. Drag to organize.');
  const c=$('#controls'); c.innerHTML='';
  const help=ce('button','ghost btn'); help.textContent='I\'m not sure — show me'; help.onclick=onShowAdvice; c.appendChild(help);
}
function drawPrompt(drawn, away){
  const dL=faceLabel(drawn);
  const useful = away < (G.lastAway==null?99:G.lastAway); G.lastAway=away;
  const open = useful ? `You drew the <b>${dL}</b> — that one helps.` : `You drew the <b>${dL}</b> — it doesn't fit ${G.line.sec} Line ${G.line.line}.`;
  const ask = G.draws<=2
    ? `Now your turn to read it: which tile is <b>dead weight</b> for this line? Tap the one you'd let go.`
    : `Your discard — tap the tile you'd let go.`;
  return open+' '+ask;
}
/* ---- player picks a discard, Prim reacts to THEIR choice, player confirms (the "we do" of gradual release) ---- */
function selectForDiscard(id, fromAdvice){
  const t=G.rack.find(x=>x.id===id); if(!t) return;
  G.pendingId=id; G.byAdvice=!!fromAdvice;
  renderRack();
  const v=discardVerdict(id); const lbl=faceLabel(t.c);
  let msg;
  if(fromAdvice){
    msg = v.good ? `I'd let the <b>${lbl}</b> go — it isn't doing any work for ${G.line.sec} Line ${G.line.line}. Discard it when you're ready, or pick your own.`
                 : `Honestly, there's no dead weight left — everything's working. If you must pass one, the <b>${lbl}</b> costs the least.`;
  } else if(v.good){
    msg = v.joker ? `Good — that Joker can't help this line, so it's fair to pitch.`
                  : `Good eye — the <b>${lbl}</b> isn't part of ${G.line.sec} Line ${G.line.line}. Clean discard.`;
  } else {
    msg = v.joker ? `I'd hold that Joker — this line can still use it. Sure?`
                  : `Careful — the <b>${lbl}</b> is working toward your hand. You can let it go, but I'd keep it. Tap another, or discard it anyway.`;
  }
  say(msg);
  const c=$('#controls'); c.innerHTML='';
  const conf=ce('button','btn'); conf.textContent=`Discard the ${lbl}`; conf.onclick=()=>doDiscardById(G.pendingId); c.appendChild(conf);
  if(!fromAdvice){ const help=ce('button','ghost btn'); help.textContent='What would you do?'; help.onclick=onShowAdvice; c.appendChild(help); }
  hint('Tap a different tile to change your mind, or confirm below.');
}
function onShowAdvice(){ selectForDiscard(leastUsefulId(), true); }
function doDiscardById(id){ const i=G.rack.findIndex(t=>t.id===id); if(i>=0) doDiscardByIndex(i); }
function doDiscardByIndex(i){
  if(G.phase!=='discard'||i<0||i>=G.rack.length) return;
  if(G.rack[i].c==='JK'){ hint('Pitching a Joker? That\'s almost never right — but it\'s your call.'); }
  G.rack.splice(i,1); G.discards++;
  G.rack=sortRack(G.rack);
  beginDrawPhase();
  renderRack();            // refresh the rack DOM so the discarded tile leaves immediately
  const away=updateAway();
  say(`Down to thirteen. You're <b>${away}</b> from ${G.line.sec} Line ${G.line.line}. Draw again when you're ready.`);
  hint('Drag tiles to organize while you think.');
}

function maybeOfferDeclare(){
  if(anyComplete(rackFaces(), G.line.hands) && G.rack.length===14){ offerDeclare(null); return true; }
  return false;
}
function offerDeclare(justDrewId){
  G.phase='declare';
  G.drawnId = justDrewId!=null ? justDrewId : null;
  G.pendingId=null; G.byAdvice=false;
  renderRack();
  updateAway();
  say(`That's it — your rack is <b>whole</b>. Fourteen tiles, every one part of <b>${G.line.sec} Line ${G.line.line}</b>. Don't discard. <b>Declare Mahjong!</b>`);
  hint('');
  const c=$('#controls'); c.innerHTML='';
  const b=ce('button','btn'); b.textContent='Declare Mahjong!'; b.onclick=winHand; c.appendChild(b);
  const b2=ce('button','ghost btn'); b2.textContent='Keep playing'; b2.onclick=()=>{ // let them keep going (rare)
    G.phase='discard'; G.pendingId=null; G.byAdvice=false; renderRack();
    say('Your call — tap the tile you\'d let go.'); hint('Tap your discard, then confirm.');
    c.innerHTML=''; const help=ce('button','ghost btn'); help.textContent='I\'m not sure — show me'; help.onclick=onShowAdvice; c.appendChild(help); };
  c.appendChild(b2);
}
function winHand(){
  G.phase='won';
  try{ if(Kit&&Kit.confetti)Kit.confetti(); }catch(_){}
  const closing = primClosing();
  const scrim=ce('div','scrim show');
  scrim.innerHTML=`<div class="card prim-card"><h2>Mahjong.</h2>
    <p class="verdict">${closing}</p>
    <p style="margin:.4em 0 0;">You completed <b>${G.line.sec} · Line ${G.line.line}</b> in <b>${G.draws}</b> draws.</p>
    <div class="modal-actions"><button class="btn" id="againBtn">Play another hand</button><button class="btn ghost" id="lb2">Leaderboard</button></div></div>`;
  document.body.appendChild(scrim);
  scrim.querySelector('#againBtn').onclick=()=>{ scrim.remove(); startScreen(); };
  scrim.querySelector('#lb2').onclick=()=>{ if(window.OOTT&&window.OOTT.openLeaderboard)window.OOTT.openLeaderboard(); };
  try{ if(window.OOTT&&window.OOTT.logSession){ window.OOTT.logSession({mode:'coached',level:G.line.line,accuracy:100,duration_sec:G.draws,clean:true}); } }catch(_){}
}
function primClosing(){
  const bits=[
    `You held your line and let the strangers go — that's the whole game, really.`,
    `See how it came together once you stopped chasing every pretty tile? Discipline wins hands.`,
    `That's a clean build. You read the rack, you trusted the line, you finished it.`
  ];
  return pick(bits);
}

/* boot */
function boot(){
  if(!CARD.length||!Kit){ showErr('Data or engine failed to load (card2026.js / scenario.js).'); return; }
  if(window.OOTTCARD) OOTTCARD.mount($('#cardsel'), ()=>{ CARD=OOTTCARD.active(); startScreen(); });
  startScreen();
}
boot();
</script>

  window.OOTT_REDIRECT  = "https://www.orderofthetile.com/mini-games/coached-hand/";
</script>
